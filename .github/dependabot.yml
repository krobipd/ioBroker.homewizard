# Dependabot will run on day 18 of each month at 02:30 (Europe/Berlin timezone)
version: 2
updates:

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'wednesday'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 15
    assignees:
      - 'krobipd'
    versioning-strategy: 'increase'
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: '@types/node'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'typescript'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'eslint'
        update-types:
          - 'version-update:semver-major'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'wednesday'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 15
    assignees:
      - 'krobipd'
